name: Build and Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, feature/* ]
    types: [ opened, synchronize, reopened, labeled ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build and run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0

    - uses: webiny/action-conventional-commits@faccb24fc2550dd15c0390d944379d2d8ed9690e

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Cache SonarQube packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

    - name: Build & Test with Gradle
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./gradlew check sonar

    - name: Upload Test Report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      if: always() # always run even if the previous step fails
      with:
        name: junit-test-results
        path: '**/build/test-results/*/TEST-*.xml'
        retention-days: 1

    - name: Upload coverage report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: coverage-report
        path: build/reports/kover
        retention-days: 1

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
      if: always()
      with:
        check_name: Unit Tests
        files: |
          **/build/test-results/*/TEST-*.xml

    - name: Add coverage report to PR
      if: github.event_name == 'pull_request' || github.event_name == 'push'
      id: kover
      uses: mi-kas/kover-report@5f58465b6f395c8fa3adc2665e27250bad87de50
      with:
        path: |
          build/reports/kover/report.xml
        title: Code Coverage
        update-comment: true
  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        db: [ POSTGRESQL, MYSQL, SQLITE, MSSQLSERVER, ORACLE, DUCKDB ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Integration tests
        run: ./gradlew integrationTest -Ddb=${{ matrix.db }}

      - name: Upload Test Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always() # always run even if the previous step fails
        with:
          name: ${{ matrix.db }}-test-results
          path: '**/build/test-results/integrationTest/TEST-*.xml'
          retention-days: 1

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        if: always()
        with:
          check_name: ${{ matrix.db }} Integration Tests
          files: |
            **/build/test-results/integrationTest/TEST-*.xml

  compatibility-test:
    name: Compatibility tests
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-compat-tests')
    strategy:
      matrix:
        db: [ MARIADB ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Compatibility tests
        run: ./gradlew integrationTest -Ddb=${{ matrix.db }}
      - name: Upload Test Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: ${{ matrix.db }}-compat-test-results
          path: '**/build/test-results/integrationTest/TEST-*.xml'
          retention-days: 1
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        if: always()
        with:
          check_name: ${{ matrix.db }} Compatibility Tests
          files: |
            **/build/test-results/integrationTest/TEST-*.xml
